# ╔══════════════════════════════════════════════════════════════╗
# ║  ECOSKILLER ANTIGRAVITY — CAT-19 MCP SERVER CONFIG          ║
# ║  Platform Stability & Risk                                  ║
# ╚══════════════════════════════════════════════════════════════╝

spring.application.name=ecoskiller-cat19-antigravity-mcp
server.port=8019

# MCP Server Identity
mcp.server.name=ecoskiller-cat19-platform-stability-risk
mcp.server.version=1.0.0-ANTIGRAVITY-SEALED
mcp.server.category=CAT-19
mcp.server.platform=ECOSKILLER-ANTIGRAVITY

# Logging
logging.level.com.ecoskiller=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=CAT-19 Platform Stability & Risk MCP Server
info.app.platform=ECOSKILLER ANTIGRAVITY
info.app.agents=POLICY_VERSION_CONTROL_AGENT,REGULATORY_COMPLIANCE_MAPPING_AGENT,RESOURCE_CONSUMPTION_GUARD_AGENT,REVENUE_SHARE_RECONCILIATION_AGENT

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
