spring:
  application:
    name: mcp-02-governance

  ai:
    mcp:
      server:
        name: mcp-02-governance
        version: 1.0.0
        type: ASYNC
        sse-message-endpoint: /mcp/message
        resource-change-notification: true
        tool-change-notification: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ecoskiller: DEBUG
    org.springframework.ai.mcp: INFO
