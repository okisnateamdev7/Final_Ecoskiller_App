# ─────────────────────────────────────────
#  MCP-19 Platform Stability & Risk Server
#  Port: 8019
# ─────────────────────────────────────────

spring.application.name=mcp-19-stability
server.port=8019

# MCP Server Identity
spring.ai.mcp.server.name=mcp-19-stability
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.description=Ecoskiller CAT-19 Platform Stability and Risk MCP Server

# Transport — SSE (Server-Sent Events)
spring.ai.mcp.server.transport=SSE
spring.ai.mcp.server.sse.endpoint=/mcp/sse
spring.ai.mcp.server.sse.message-endpoint=/mcp/message

# Logging
logging.level.com.ecoskiller=DEBUG
logging.level.org.springframework.ai=INFO
