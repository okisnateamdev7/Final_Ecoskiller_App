# Ecoskiller — realtime-event-gateway MCP Server Configuration
# All values overridable via environment variables (Kubernetes Secrets pattern)
# ENV VAR prefix: MCP_

# Environment: dev | test | stage | prod
ENV=dev

# JWT validation (true in production; requires MCP_KEYCLOAK_ISSUER)
JWT_VALIDATION_ENABLED=false

# Keycloak issuer base URL (realm name appended at runtime)
KEYCLOAK_ISSUER=https://auth.ecoskiller.com/realms/

# MCP rate limit: requests per minute
RATE_LIMIT_PER_MINUTE=120

# WebSocket capacity per pod (doc spec: 10k)
MAX_CONNECTIONS=10000

# Circuit breaker threshold: events/sec (doc spec: 50k)
MAX_EVENTS_SEC_GLOBAL=50000

# Per-client rate limit: events/sec (doc spec: 100)
MAX_EVENTS_SEC_CLIENT=100

# Ring buffer capacity per client (doc spec: 100 messages)
RING_BUFFER_CAPACITY=100

# How many minutes to keep ring buffer for replay (doc spec: 5 min)
BUFFER_REPLAY_WINDOW_MIN=5

# Circuit breaker threshold (events/sec, same as MAX_EVENTS_SEC_GLOBAL)
CIRCUIT_BREAKER_THRESHOLD=50000

# Log level: DEBUG | INFO | WARNING | ERROR
LOG_LEVEL=INFO
