version: '3.9'

services:
  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"    # gRPC receiver
      - "4318:4318"    # HTTP receiver
      - "8888:8888"    # Prometheus metrics
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml
    environment:
      - GOGC=80
    networks:
      - otel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Grafana Tempo (trace storage)
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3100:3100"    # Tempo UI
      - "4317:4317"    # gRPC receiver
    volumes:
      - ./config/tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    environment:
      - GOGC=80
    networks:
      - otel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Prometheus (metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    environment:
      - TZ=UTC
    networks:
      - otel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Grafana (visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBED_INIT_STATUS_ERROR_PAGE=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - tempo
    networks:
      - otel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # OpenTelemetry MCP Server
  otel-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otel-mcp-server
    ports:
      - "9091:9090"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9090
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SAMPLING_RATE=1.0  # 100% for dev/test
      - ENVIRONMENT=dev
      - TLS_ENABLED=false  # Disabled for local dev
      - THREAD_POOL_SIZE=8
      - BATCH_SIZE=64
      - BATCH_TIMEOUT_MS=3000
      - QUEUE_SIZE=1024
      - LOG_LEVEL=DEBUG
    volumes:
      - ./logs:/opt/otel-mcp-server/logs
      - ./config/application-dev.conf:/opt/otel-mcp-server/application.conf
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - otel-network
    healthcheck:
      test: |
        curl -f -X POST http://localhost:9090 \
          -H "Content-Type: application/json" \
          -d '{"jsonrpc":"2.0","method":"ping","id":"health"}' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Kafka (for testing Kafka trace propagation)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - otel-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - otel-network

networks:
  otel-network:
    driver: bridge

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
