# Ecoskiller — Skill Evaluation Engine MCP Server Configuration
# Override any value via environment variable (Kubernetes Secrets pattern)
# ENV VAR prefix: MCP_

# Environment: dev | test | stage | prod
ENV=dev

# JWT validation (set to true in production; requires MCP_KEYCLOAK_ISSUER)
JWT_VALIDATION_ENABLED=false

# Keycloak issuer base URL (tenant realm appended at runtime)
KEYCLOAK_ISSUER=https://auth.ecoskiller.com/realms/

# Rate limit: max requests per minute per client
RATE_LIMIT_PER_MINUTE=100

# Log level: DEBUG | INFO | WARNING | ERROR
LOG_LEVEL=INFO
