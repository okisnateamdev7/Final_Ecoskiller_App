apiVersion: v1
kind: Namespace
metadata:
  name: minio-mcp
  labels:
    app: minio-mcp-server
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-mcp-config
  namespace: minio-mcp
data:
  LOG_LEVEL: "INFO"
  JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xms256m -Xmx512m"
  LOG_FILE_PATH: "/var/log/minio-mcp/server.log"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-mcp-credentials
  namespace: minio-mcp
type: Opaque
stringData:
  # These should be injected via Helm or sealed-secrets in production
  MINIO_ENDPOINT: "minio.default.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "YOUR_ACCESS_KEY_HERE"
  MINIO_SECRET_KEY: "YOUR_SECRET_KEY_HERE"
  TENANT_ID: "default"
  SERVICE_ACCOUNT_ID: "minio-mcp-server"
  MINIO_USE_SSL: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
  labels:
    app: minio-mcp-server
    version: "2.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: minio-mcp-server
  template:
    metadata:
      labels:
        app: minio-mcp-server
        version: "2.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: minio-mcp-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - minio-mcp-server
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: minio-mcp-server
        image: ecoskiller/minio-mcp-server:2.0
        imagePullPolicy: IfNotPresent
        
        # Resources
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        # Environment variables
        envFrom:
        - configMapRef:
            name: minio-mcp-config
        - secretRef:
            name: minio-mcp-credentials
        
        # Ports
        ports:
        - name: http
          containerPort: 9000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Security context for container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # Startup probe
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "echo 'startup probe'" 
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        
        # Liveness probe
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "echo 'liveness probe'"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "echo 'readiness probe'"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: logs
          mountPath: /var/log/minio-mcp
          readOnly: false
        - name: tmp
          mountPath: /tmp
          readOnly: false
        - name: cache
          mountPath: /app/.cache
          readOnly: false
      
      # Init container for permissions
      initContainers:
      - name: setup-permissions
        image: busybox:1.35
        command: ['sh', '-c', 'mkdir -p /var/log/minio-mcp && chmod 775 /var/log/minio-mcp']
        volumeMounts:
        - name: logs
          mountPath: /var/log/minio-mcp
      
      # Volumes
      volumes:
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: minio-mcp-server-svc
  namespace: minio-mcp
  labels:
    app: minio-mcp-server
spec:
  type: ClusterIP
  selector:
    app: minio-mcp-server
  ports:
  - name: http
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
  labels:
    app: minio-mcp-server

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["minio-mcp-credentials"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["minio-mcp-config"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minio-mcp-server
subjects:
- kind: ServiceAccount
  name: minio-mcp-server
  namespace: minio-mcp

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: minio-mcp-server

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: minio-mcp-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio-mcp-server
  namespace: minio-mcp
  labels:
    app: minio-mcp-server
spec:
  selector:
    matchLabels:
      app: minio-mcp-server
  endpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 10s
